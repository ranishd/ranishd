name: Supabase Keep-Alive Cron

on:
  schedule:
    # Runs at 00:00 every 3 days
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  ping-databases:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permission to push the commit
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Ping Supply Chain Dashboard Supabase
        run: curl -I -X GET "https://tobopzxfqkcfxfhkvdap.supabase.co" || true

      - name: Ping Byters Platform Supabase
        run: curl -I -X GET "https://rltcnrkvuyagnnsdywqv.supabase.co" || true

      - name: Generate Contribution Commit
        run: |
          echo "Last keep-alive ping: $(date)" > .keepalive
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git commit -m "chore: automate keep-alive ping and profile contribution" || echo "No changes to commit"
          git push
