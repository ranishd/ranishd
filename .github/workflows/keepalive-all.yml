name: Keep Everything Alive

# Pings StellarX Render backend every 14 min (sleeps after 15 min idle)
# and queries Supabase databases with real REST calls to prevent 7-day pause.

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping-services:
    runs-on: ubuntu-latest
    steps:
      # ── RENDER ──
      - name: Ping StellarX Backend (Render)
        run: |
          curl -fsS --max-time 30 "${{ secrets.STELLARX_RENDER_URL }}" || echo "StellarX ping failed or URL not set"

      # ── SUPABASE (real REST queries to count as activity) ──

      - name: Query Supply Chain Dashboard (Supabase)
        run: |
          curl -fsS --max-time 15 \
            "https://tobopzxfqkcfxfhkvdap.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPPLY_CHAIN_SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPPLY_CHAIN_SUPABASE_KEY }}" \
            || echo "Supply Chain Supabase query failed or key not set"

      - name: Query Byters Platform (Supabase)
        run: |
          curl -fsS --max-time 15 \
            "https://rltcnrkvuyagnnsdywqv.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.BYTERS_SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.BYTERS_SUPABASE_KEY }}" \
            || echo "Byters Supabase query failed or key not set"

      - name: Done
        run: echo "✅ Keep-alive pings sent at $(date -u)"
