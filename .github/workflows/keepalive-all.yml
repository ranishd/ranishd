name: Keep Everything Alive

# Pings StellarX Render backend every 14 min (sleeps after 15 min idle)
# and Supabase projects to prevent 7-day inactivity pause.

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping-services:
    runs-on: ubuntu-latest
    steps:
      # ── RENDER ──
      - name: Ping StellarX Backend (Render)
        run: |
          curl -fsS --max-time 30 "${{ secrets.STELLARX_RENDER_URL }}" || echo "StellarX ping failed or URL not set"

      # ── SUPABASE ──
      - name: Ping Supply Chain Dashboard (Supabase)
        run: |
          curl -fsS --max-time 15 -I "https://tobopzxfqkcfxfhkvdap.supabase.co" || echo "Ping failed"

      - name: Ping Byters Platform (Supabase)
        run: |
          curl -fsS --max-time 15 -I "https://rltcnrkvuyagnnsdywqv.supabase.co" || echo "Ping failed"

      - name: Done
        run: echo "✅ Keep-alive pings sent at $(date -u)"
